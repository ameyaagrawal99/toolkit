<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ToolVault</title>
    <script>
      // Redirect all 404s back to index.html for SPA routing on GitHub Pages
      var path = window.location.pathname;
      var base = '/toolkit';
      if (path.startsWith(base)) {
        sessionStorage.setItem('spa-redirect', path.slice(base.length) || '/');
      }
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
